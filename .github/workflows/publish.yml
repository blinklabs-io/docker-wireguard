    branches:
      - main
    tags:
      - v*.*.*

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  id-token: write
  packages: write
  statuses: write

jobs:
  orchestrate:
    uses: blinklabs-io/actions/.github/workflows/reuseable-publish.yml@main
    secrets:
      docker-password: ${{ secrets.DOCKER_PASSWORD }}
